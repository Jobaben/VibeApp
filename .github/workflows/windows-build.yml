name: Build Windows App

# Produces a self-contained Windows executable (VibeApp.exe) that non-technical
# users can download and double-click — no Python, Node, or setup required.

on:
  push:
    branches: [ claude/windows-executable-build-ylxsgr ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (same-origin API)
        working-directory: ./frontend
        env:
          # Served from the same server as the API, so use a relative base.
          VITE_API_URL: /api
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies + PyInstaller
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: pyinstaller packaging/vibeapp.spec --noconfirm

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/VibeApp.exe release/VibeApp.exe
          Copy-Item packaging/README-WINDOWS.txt release/README.txt
          Copy-Item packaging/.env.example release/.env.example

      - name: Smoke test the executable
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath dist/VibeApp.exe -PassThru
          $ok = $false
          foreach ($port in 8000, 8080, 8888) {
            for ($i = 0; $i -lt 40; $i++) {
              try {
                $r = Invoke-WebRequest -Uri "http://127.0.0.1:$port/health" -UseBasicParsing -TimeoutSec 2
                if ($r.StatusCode -eq 200) { $ok = $true; break }
              } catch { Start-Sleep -Milliseconds 750 }
            }
            if ($ok) { Write-Host "Server healthy on port $port"; break }
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) { Write-Error "Executable failed health check"; exit 1 }

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path release/* -DestinationPath VibeApp-Windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeApp-Windows
          path: VibeApp-Windows.zip
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: VibeApp-Windows.zip
